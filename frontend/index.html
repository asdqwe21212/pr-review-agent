<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Review Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Emerald Signal Theme */
    --bg-primary: #ecfdf5;
    --bg-secondary: #f8fffb;
    --bg-tertiary: #f0fdf4;
    
    --surface: rgba(255, 255, 255, 0.86);
    --surface-hover: rgba(255, 255, 255, 0.96);
    --surface-active: rgba(16, 185, 129, 0.12);
    --surface-strong: #ffffff;
    --surface-glass: rgba(255, 255, 255, 0.72);
    
    --border: rgba(15, 118, 110, 0.16);
    --border-subtle: rgba(15, 118, 110, 0.10);
    --border-bright: rgba(16, 185, 129, 0.30);
    
    --text-primary: #0f172a;
    --text-secondary: #334155;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    
    /* Emerald palette */
    --emerald-50: #ecfdf5;
    --emerald-100: #d1fae5;
    --emerald-200: #a7f3d0;
    --emerald-300: #6ee7b7;
    --emerald-400: #34d399;
    --emerald-500: #10b981;
    --emerald-600: #059669;
    --emerald-700: #047857;
    --emerald-800: #065f46;
    --emerald-900: #064e3b;
    --cyan-soft: #ccfbf1;
    
    --blue-50: var(--emerald-50);
    --blue-100: var(--emerald-100);
    --blue-200: var(--emerald-200);
    --blue-300: var(--emerald-300);
    --blue-400: var(--emerald-400);
    --blue-500: var(--emerald-500);
    --blue-600: var(--emerald-600);
    --blue-700: var(--emerald-700);
    --blue-800: var(--emerald-800);
    --blue-900: var(--emerald-900);
    
    --accent-primary: #10b981;
    --accent-secondary: #059669;
    --accent-light: #34d399;
    --accent-bg: rgba(16, 185, 129, 0.10);
    --accent-glow: rgba(16, 185, 129, 0.22);
    
    --green: #10b981;
    --green-bg: rgba(16, 185, 129, 0.12);
    --green-border: rgba(16, 185, 129, 0.30);
    
    --red: #dc2626;
    --red-bg: #fef2f2;
    --red-border: #fecaca;
    
    --yellow: #d97706;
    --yellow-bg: #fffbeb;
    --yellow-border: #fde68a;
    
    --purple: #14b8a6;
    --purple-bg: #f0fdfa;
    
    /* Typography */
    --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    
    /* Shadows */
    --shadow-xs: 0 1px 2px rgba(6, 95, 70, 0.06);
    --shadow-sm: 0 8px 20px rgba(6, 95, 70, 0.08), 0 1px 3px rgba(15, 23, 42, 0.05);
    --shadow: 0 16px 36px rgba(6, 95, 70, 0.10), 0 2px 8px rgba(15, 23, 42, 0.05);
    --shadow-md: 0 22px 48px rgba(6, 95, 70, 0.14), 0 8px 18px rgba(15, 23, 42, 0.06);
    --shadow-lg: 0 32px 70px rgba(6, 95, 70, 0.18), 0 12px 24px rgba(15, 23, 42, 0.08);
    
    /* Transitions */
    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background:
      radial-gradient(circle at 12% 16%, rgba(16, 185, 129, 0.22), transparent 28%),
      radial-gradient(circle at 82% 8%, rgba(20, 184, 166, 0.18), transparent 30%),
      linear-gradient(135deg, #f8fffb 0%, #ecfdf5 46%, #d1fae5 100%);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(6, 95, 70, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(6, 95, 70, 0.035) 1px, transparent 1px);
    background-size: 36px 36px;
    -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent 72%);
    mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent 72%);
  }

  .app { 
    display: flex; 
    flex-direction: column; 
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    background: rgba(255, 255, 255, 0.74);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-xs);
    position: sticky;
    top: 0;
    z-index: 100;
    -webkit-backdrop-filter: blur(18px) saturate(150%);
    backdrop-filter: blur(18px) saturate(150%);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, #10b981 0%, #0d9488 48%, #047857 100%);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    font-family: var(--font-mono);
    box-shadow: 0 14px 28px rgba(16, 185, 129, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.32);
  }

  .logo-text {
    font-family: var(--font-sans);
    font-size: 21px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.7px;
  }

  .logo-text span { 
    background: linear-gradient(135deg, var(--accent-primary), var(--emerald-700));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800; 
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 700;
    color: var(--emerald-800);
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.16), rgba(204, 251, 241, 0.50));
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid rgba(16, 185, 129, 0.24);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72), 0 10px 22px rgba(6, 95, 70, 0.08);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.18), 0 0 16px rgba(16, 185, 129, 0.55);
  }

  /* Main layout */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 380px minmax(0, 1fr);
    grid-template-rows: auto minmax(560px, 1fr);
    gap: 20px;
    padding: 22px 28px 28px;
  }

  /* Stats bar */
  .stats-bar {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    background: var(--surface-glass);
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: var(--shadow-md);
    overflow: hidden;
    -webkit-backdrop-filter: blur(18px) saturate(150%);
    backdrop-filter: blur(18px) saturate(150%);
  }

  .stat-item {
    padding: 22px 24px;
    border-right: 1px solid var(--border-subtle);
    transition: var(--transition);
    position: relative;
  }
  .stat-item:last-child { border-right: none; }
  .stat-item:hover { 
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(236, 253, 245, 0.74));
    transform: translateY(-1px);
  }

  .stat-item::before {
    content: '';
    position: absolute;
    left: 24px;
    right: 24px;
    top: 0;
    height: 3px;
    border-radius: 0 0 99px 99px;
    background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.56), transparent);
    opacity: 0;
    transition: var(--transition);
  }

  .stat-item:hover::before { opacity: 1; }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: var(--font-sans);
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 4px;
    letter-spacing: -1px;
  }

  .stat-value.accent { 
    color: var(--accent-primary);
  }
  .stat-value.green { 
    color: var(--green);
  }
  .stat-value.orange { 
    color: var(--yellow);
  }

  .stat-sub { 
    font-size: 12px; 
    color: var(--text-muted); 
  }

  .budget-bar-container {
    width: 100%;
    height: 7px;
    background: rgba(6, 95, 70, 0.08);
    border-radius: 999px;
    margin-top: 12px;
    overflow: hidden;
  }

  .budget-bar {
    height: 100%;
    border-radius: 999px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s ease;
    background: linear-gradient(90deg, #6ee7b7, #10b981, #047857);
    box-shadow: 0 0 18px rgba(16, 185, 129, 0.34);
    width: 0%;
  }

  .budget-bar.warning { 
    background: linear-gradient(90deg, var(--yellow), #f59e0b);
  }
  .budget-bar.critical { 
    background: linear-gradient(90deg, var(--red), #ef4444);
  }

  /* Sidebar */
  .sidebar {
    border: 1px solid var(--border);
    background: var(--surface-glass);
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: var(--shadow-md);
    -webkit-backdrop-filter: blur(18px) saturate(150%);
    backdrop-filter: blur(18px) saturate(150%);
  }

  /* Review Form */
  .form-panel {
    padding: 26px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(236, 253, 245, 0.56));
  }

  .panel-title {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--emerald-800);
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(16, 185, 129, 0.34), transparent);
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    background: rgba(255, 255, 255, 0.84);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 13px 16px;
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: var(--transition);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.76);
  }

  .form-input:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 4px var(--accent-glow), 0 12px 24px rgba(6, 95, 70, 0.08);
    background: var(--surface-strong);
  }

  .form-input::placeholder { color: var(--text-dim); }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
  }

  .checkbox-row input[type=checkbox] {
    accent-color: var(--accent-primary);
    width: 16px; height: 16px;
  }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #10b981 0%, #0d9488 48%, #047857 100%);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: var(--font-sans);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 10px;
    box-shadow: 0 16px 30px rgba(16, 185, 129, 0.30), inset 0 1px 0 rgba(255, 255, 255, 0.28);
    position: relative;
    overflow: hidden;
  }

  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.24) 45%, transparent 70%);
    transform: translateX(-120%);
    transition: transform 0.6s ease;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 20px 38px rgba(16, 185, 129, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.32);
    background: linear-gradient(135deg, #34d399 0%, #10b981 42%, #065f46 100%);
  }

  .btn-primary:hover::after { transform: translateX(120%); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    background: var(--bg-primary);
    color: var(--text-dim);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Job List */
  .jobs-panel {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .jobs-panel::-webkit-scrollbar { width: 6px; }
  .jobs-panel::-webkit-scrollbar-track { background: transparent; }
  .jobs-panel::-webkit-scrollbar-thumb { 
    background: var(--border-bright); 
    border-radius: 3px;
  }
  .jobs-panel::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  .jobs-header {
    padding: 17px 24px 13px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.7px;
    text-transform: uppercase;
    color: var(--emerald-800);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    background: rgba(255, 255, 255, 0.82);
    z-index: 10;
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
  }

  .jobs-header .status-dot {
    margin-left: auto;
    width: 6px; height: 6px;
    box-shadow: none;
  }

  .job-item {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
  }

  .job-item:hover { 
    background: rgba(236, 253, 245, 0.76);
  }
  .job-item.active {
    background: linear-gradient(90deg, rgba(16, 185, 129, 0.16), rgba(255, 255, 255, 0.72));
    border-left: 4px solid var(--accent-primary);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
  }

  .job-status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .job-status-dot.pending { 
    background: var(--text-dim); 
  }
  .job-status-dot.running { 
    background: var(--accent-primary);
    box-shadow: 0 0 0 3px var(--accent-glow);
    animation: pulse-dot 1.5s ease-in-out infinite; 
  }
  .job-status-dot.done { 
    background: var(--green);
    box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.2);
  }
  .job-status-dot.error { 
    background: var(--red);
    box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.2);
  }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 3px var(--accent-glow); }
    50% { box-shadow: 0 0 0 6px var(--accent-glow); }
  }

  .job-info { flex: 1; min-width: 0; }

  .job-repo {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .job-meta { 
    font-size: 12px; 
    color: var(--text-muted);
  }

  .job-score {
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 20px;
  }

  /* Content panel */
  .content {
    overflow-y: auto;
    background: rgba(255, 255, 255, 0.62);
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: var(--shadow-md);
    -webkit-backdrop-filter: blur(18px) saturate(145%);
    backdrop-filter: blur(18px) saturate(145%);
  }

  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-thumb { 
    background: var(--border-bright); 
    border-radius: 3px;
  }

  .empty-state {
    min-height: 560px;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 18px;
    text-align: center;
    background:
      radial-gradient(circle at center, rgba(16, 185, 129, 0.12), transparent 30%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(236, 253, 245, 0.34));
  }

  .empty-icon {
    width: 92px; height: 92px;
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.18), rgba(204, 251, 241, 0.72));
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    color: var(--emerald-700);
    border: 1px solid rgba(16, 185, 129, 0.26);
    box-shadow: 0 22px 44px rgba(16, 185, 129, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.76);
  }

  .empty-text { 
    font-size: 16px; 
    color: var(--text-secondary); 
    font-weight: 700;
  }

  /* Review Detail */
  .review-detail { 
    padding: 44px; 
    max-width: 1080px;
    margin: 0 auto;
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .review-header {
    margin-bottom: 32px;
    padding: 28px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(236, 253, 245, 0.62));
    box-shadow: var(--shadow-sm);
  }

  .review-pr-number {
    font-size: 12px;
    font-weight: 700;
    color: var(--emerald-800);
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.14), rgba(204, 251, 241, 0.66));
    display: inline-block;
    padding: 7px 14px;
    border-radius: 999px;
    font-family: var(--font-mono);
    border: 1px solid rgba(16, 185, 129, 0.24);
  }

  .review-title {
    font-family: var(--font-sans);
    font-size: 28px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 18px;
    line-height: 1.28;
    letter-spacing: -0.8px;
  }

  .review-meta-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .review-meta-item {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 600;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.62);
    border: 1px solid var(--border-subtle);
    border-radius: 999px;
  }
  .review-meta-item span { 
    color: var(--text-primary); 
    font-weight: 800; 
  }

  /* Score section */
  .score-section {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 30px;
    align-items: center;
    margin-bottom: 24px;
    padding: 30px;
    background: rgba(255, 255, 255, 0.86);
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }

  .score-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 12% 20%, rgba(16, 185, 129, 0.14), transparent 32%);
    pointer-events: none;
  }

  .score-section > * { position: relative; }

  .score-circle {
    width: 112px; height: 112px;
    position: relative;
    filter: drop-shadow(0 14px 22px rgba(16, 185, 129, 0.16));
  }

  .score-circle svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .score-circle-bg { fill: none; stroke: rgba(6, 95, 70, 0.10); stroke-width: 8; }
  .score-circle-fill { 
    fill: none; 
    stroke-width: 8; 
    stroke-linecap: round; 
    transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1); 
  }

  .score-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-sans);
    font-size: 28px;
    font-weight: 800;
    color: var(--text-primary);
  }

  .score-summary { 
    font-size: 15px; 
    color: var(--text-secondary); 
    line-height: 1.7; 
    margin-bottom: 16px; 
  }

  .verdict-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.3px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
  }
  .verdict-badge.approve {
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.16), rgba(204, 251, 241, 0.74));
    color: var(--emerald-800);
    border: 1px solid var(--green-border);
  }
  .verdict-badge.changes {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid var(--red-border);
  }

  /* Issue sections */
  .issues-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 18px;
  }

  .issue-section {
    background: rgba(255, 255, 255, 0.86);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: var(--shadow-xs);
    transition: var(--transition);
  }

  .issue-section:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-sm);
  }

  .issue-section-full { grid-column: 1 / -1; }

  .issue-section-header {
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-muted);
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(236, 253, 245, 0.72));
  }

  .issue-section-header .icon-label { display: flex; align-items: center; gap: 10px; }
  .issue-count {
    background: rgba(16, 185, 129, 0.10);
    border: 1px solid rgba(16, 185, 129, 0.16);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 800;
    color: var(--emerald-800);
    font-family: var(--font-mono);
  }

  .issue-list { padding: 4px 0; }

  .issue-item {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .issue-item:last-child { border-bottom: none; }

  .issue-location {
    font-size: 12px;
    font-weight: 700;
    color: var(--emerald-800);
    background: rgba(16, 185, 129, 0.10);
    border-radius: 999px;
    padding: 5px 11px;
    display: inline-block;
    margin-bottom: 9px;
    font-family: var(--font-mono);
    border: 1px solid rgba(16, 185, 129, 0.22);
  }

  .issue-desc {
    font-size: 14px;
    color: var(--text-primary);
    margin-bottom: 10px;
    line-height: 1.6;
  }

  .issue-suggestion {
    font-size: 13px;
    color: var(--text-secondary);
    background: linear-gradient(135deg, rgba(236, 253, 245, 0.76), rgba(255, 255, 255, 0.86));
    border-left: 3px solid var(--accent-primary);
    padding: 12px 16px;
    border-radius: 0 12px 12px 0;
    line-height: 1.6;
  }

  .no-issues {
    padding: 32px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
  }

  /* Positives */
  .positive-item {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 14px;
    color: var(--text-primary);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    line-height: 1.6;
  }
  .positive-item:last-child { border-bottom: none; }
  .positive-item::before {
    content: '✓';
    color: #fff;
    font-weight: 800;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent-primary), var(--emerald-700));
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 12px;
    border: 1px solid rgba(16, 185, 129, 0.28);
    box-shadow: 0 8px 16px rgba(16, 185, 129, 0.20);
  }

  /* Token usage */
  .token-bar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    padding: 17px 24px;
    background: rgba(255, 255, 255, 0.86);
    border: 1px solid var(--border);
    border-radius: 18px;
    margin-top: 18px;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 600;
    box-shadow: var(--shadow-xs);
  }

  .token-bar span { 
    color: var(--accent-primary); 
    font-weight: 700; 
  }

  /* Loading state */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 40px;
    gap: 20px;
  }

  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(16, 185, 129, 0.14);
    border-top-color: var(--accent-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    box-shadow: 0 0 26px rgba(16, 185, 129, 0.18);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
  }

  .turn-indicator {
    font-size: 13px;
    color: var(--accent-primary);
    font-weight: 500;
  }

  /* Severity colors */
  .sev-critical { color: var(--red); font-weight: 700; }
  .sev-high { color: var(--yellow); font-weight: 700; }
  .sev-medium { color: var(--accent-primary); font-weight: 700; }
  .sev-low { color: var(--green); font-weight: 700; }
  .sev-bugs { color: var(--red); }
  .sev-security { color: var(--yellow); }
  .sev-performance { color: var(--accent-primary); }
  .sev-quality { color: var(--purple); }

  /* Responsive */
  @media (max-width: 1100px) {
    main { grid-template-columns: 340px minmax(0, 1fr); padding: 18px; }
    .stats-bar { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto; }
    .sidebar { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); max-height: 50vh; }
    .issues-grid { grid-template-columns: 1fr; }
    header { padding: 12px 20px; }
    .review-detail { padding: 24px; }
    .score-section { grid-template-columns: 1fr; text-align: center; justify-items: center; }
  }

  @media (max-width: 620px) {
    main { padding: 12px; gap: 12px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); border-radius: 18px; }
    .stat-item { padding: 18px; }
    .stat-value { font-size: 24px; }
    .header-status { display: none; }
    .review-title { font-size: 23px; }
    .review-meta-row { gap: 10px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⌘</div>
      <div class="logo-text">PR<span>Review</span></div>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      <span id="agent-status">Claude API · Connected</span>
    </div>
  </header>

  <main>
    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-label">Total Reviews</div>
        <div class="stat-value accent" id="stat-total">0</div>
        <div class="stat-sub">all time</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Completed</div>
        <div class="stat-value green" id="stat-done">0</div>
        <div class="stat-sub">successful</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Running</div>
        <div class="stat-value" id="stat-running">0</div>
        <div class="stat-sub">in progress</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Avg Score</div>
        <div class="stat-value orange" id="stat-score">&mdash;</div>
        <div class="stat-sub">out of 100</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Tokens Used</div>
        <div class="stat-value" id="stat-tokens">0</div>
        <div class="stat-sub">total</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Weekly Budget</div>
        <div class="stat-value" id="stat-budget">0</div>
        <div class="budget-bar-container">
          <div class="budget-bar" id="budget-bar"></div>
        </div>
        <div class="stat-sub" id="stat-budget-sub">this week</div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Submit Form -->
      <div class="form-panel">
        <div class="panel-title">New Review</div>
        <div class="form-group">
          <label class="form-label">Repository</label>
          <input class="form-input" id="input-repo" type="text" placeholder="owner/repo-name">
        </div>
        <div class="form-group">
          <label class="form-label">PR Number</label>
          <input class="form-input" id="input-pr" type="number" placeholder="42">
        </div>
        <div class="form-group">
          <label class="checkbox-row">
            <input type="checkbox" id="input-comment" checked>
            Post comment to GitHub
          </label>
        </div>
        <button class="btn-primary" id="btn-review" onclick="submitReview()">
          Start Review
        </button>
      </div>

      <!-- Job List -->
      <div class="jobs-panel">
        <div class="jobs-header">
          Recent Jobs
          <div class="status-dot" style="margin-left: auto;"></div>
        </div>
        <div id="job-list">
          <div style="padding: 32px; text-align: center; color: var(--text-muted); font-size: 13px; font-weight: 500;">
            No reviews yet
          </div>
        </div>
      </div>
    </aside>

    <!-- Content Panel -->
    <div class="content" id="content">
      <div class="empty-state">
        <div class="empty-icon">⌘</div>
        <div class="empty-text">Select a job or submit a new PR review</div>
      </div>
    </div>
  </main>
</div>

<script>
const API = '';
let selectedJob = null;
let pollController = null;
let statsInterval = null;

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function stopPolling() {
  if (pollController) {
    pollController.abort();
    pollController = null;
  }
}

async function startPolling(jobId) {
  stopPolling();
  pollController = new AbortController();
  const maxRetries = 120;
  let retries = 0;
  
  while (retries < maxRetries && !pollController.signal.aborted) {
    await refreshJobs();
    if (selectedJob) await renderJobDetail(selectedJob);
    
    try {
      const fresh = await api('/api/jobs');
      const hasActive = fresh.some(j => j.status === 'pending' || j.status === 'running');
      if (!hasActive) break;
    } catch (e) {
      if (pollController.signal.aborted) break;
    }
    
    await new Promise(r => setTimeout(r, 2500));
    retries++;
  }
}

async function api(path, opts = {}) {
  const r = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(err.detail || r.statusText);
  }
  return r.json();
}

async function submitReview() {
  const repo = document.getElementById('input-repo').value.trim();
  const pr = parseInt(document.getElementById('input-pr').value);
  const postComment = document.getElementById('input-comment').checked;

  if (!repo || !pr) { alert('Please enter a repository and PR number.'); return; }
  if (!repo.includes('/')) { alert('Repository must be in format: owner/repo'); return; }

  const btn = document.getElementById('btn-review');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const job = await api('/api/review', {
      method: 'POST',
      body: JSON.stringify({ repo, pr_number: pr, post_comment: postComment }),
    });
    document.getElementById('input-repo').value = '';
    document.getElementById('input-pr').value = '';
    await refreshJobs();
    selectJob(job.job_id);
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Start Review';
  }
}

async function refreshJobs() {
  const jobs = await api('/api/jobs');
  const container = document.getElementById('job-list');

  if (!jobs.length) {
    container.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);font-size:13px;font-weight:500;">No reviews yet</div>';
    return;
  }

  container.innerHTML = jobs.map(j => {
    const score = j.result?.review?.overall_score;
    const scoreColor = score >= 80 ? 'var(--green)' : score >= 60 ? 'var(--yellow)' : 'var(--red)';
    const repoShort = j.repo ? escapeHtml(j.repo.split('/')[1] || j.repo) : '—';
    const time = j.created_at ? new Date(j.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
    const jobId = escapeHtml(j.job_id);
    const status = escapeHtml(j.status);
    return `
      <div class="job-item ${jobId === selectedJob ? 'active' : ''}" onclick="selectJob('${jobId}')">
        <div class="job-status-dot ${status}"></div>
        <div class="job-info">
          <div class="job-repo">${repoShort} <span style="color:var(--text-muted);font-weight:400;">#${j.pr_number}</span></div>
          <div class="job-meta">${status.toUpperCase()} &middot; ${time}</div>
        </div>
        ${score !== undefined ? `<div class="job-score" style="color:${scoreColor}">${score}</div>` : ''}
      </div>`;
  }).join('');
}

async function selectJob(jobId) {
  selectedJob = jobId;
  await refreshJobs();
  await renderJobDetail(jobId);
  
  const job = await api(`/api/jobs/${jobId}`);
  if (job.status === 'pending' || job.status === 'running') {
    startPolling(jobId);
  }
}

async function refreshStats() {
  try {
    const s = await api('/api/stats');
    document.getElementById('stat-total').textContent = s.total_reviews;
    document.getElementById('stat-done').textContent = s.completed;
    document.getElementById('stat-running').textContent = s.running;
    document.getElementById('stat-score').textContent = s.avg_score || '—';
    document.getElementById('stat-tokens').textContent = formatTokens(s.total_tokens);
  } catch(e) {}

  try {
    const m = await api('/api/metrics/tokens');
    const w = m.weekly;
    document.getElementById('stat-budget').textContent = formatTokens(w.used);
    document.getElementById('stat-budget-sub').textContent =
      'of ' + formatTokens(w.budget) + ' this week';

    const bar = document.getElementById('budget-bar');
    if (bar) {
      bar.style.width = Math.min(w.used_pct, 100) + '%';
      bar.classList.remove('warning', 'critical');
      if (w.alert_level === 'critical') bar.classList.add('critical');
      else if (w.alert_level === 'warning') bar.classList.add('warning');
    }
  } catch(e) {}
}

function formatTokens(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(0) + 'K';
  return n || '0';
}

async function renderJobDetail(jobId) {
  const job = await api(`/api/jobs/${jobId}`);
  const content = document.getElementById('content');
  await refreshStats();

  if (job.status === 'pending' || job.status === 'running') {
    const turnMessages = [
      'Fetching PR context from GitHub...',
      'Turn 1: Scanning for bugs & security vulnerabilities...',
      'Turn 2: Analyzing performance & code quality...',
      'Turn 3: Generating structured review report...',
    ];
    const turnIdx = Math.floor(Date.now() / 4000) % turnMessages.length;
    content.innerHTML = `
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">${job.status.toUpperCase()}</div>
        <div class="turn-indicator">${turnMessages[turnIdx]}</div>
      </div>`;
    return;
  }

  if (job.status === 'error') {
    content.innerHTML = `
      <div class="review-detail">
        <div style="color:var(--red);padding:24px;background:var(--red-bg);border:1px solid var(--red-border);border-radius:12px;">
          <div style="font-size:15px;font-weight:600;margin-bottom:8px;">Review Failed</div>
          <div style="font-size:13px;color:var(--text-secondary)">${escapeHtml(job.error)}</div>
        </div>
      </div>`;
    return;
  }

  const r = job.result;
  const rev = r.review;
  const score = rev.overall_score || 0;
  const scoreColor = score >= 80 ? 'var(--green)' : score >= 60 ? 'var(--yellow)' : 'var(--red)';
  const circumference = 2 * Math.PI * 36;
  const dashOffset = circumference * (1 - score / 100);

  content.innerHTML = `
    <div class="review-detail">
      <div class="review-header">
        <div class="review-pr-number">${escapeHtml(r.repo)} &middot; PR #${r.pr_number}</div>
        <div class="review-title">${escapeHtml(r.title)}</div>
        <div class="review-meta-row">
          <div class="review-meta-item">Severity: <span class="sev-${escapeHtml(rev.severity)}">${escapeHtml((rev.severity || '').toUpperCase())}</span></div>
          <div class="review-meta-item">Bugs: <span>${rev.bugs?.length || 0}</span></div>
          <div class="review-meta-item">Security: <span>${rev.security?.length || 0}</span></div>
          <div class="review-meta-item">Performance: <span>${rev.performance?.length || 0}</span></div>
          <div class="review-meta-item">Quality: <span>${rev.quality?.length || 0}</span></div>
        </div>
      </div>

      <div class="score-section">
        <div class="score-circle">
          <svg viewBox="0 0 80 80">
            <circle class="score-circle-bg" cx="40" cy="40" r="36"/>
            <circle class="score-circle-fill" cx="40" cy="40" r="36"
              stroke="${scoreColor}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${dashOffset}"/>
          </svg>
          <div class="score-number">${score}</div>
        </div>
        <div class="score-info">
          <div class="score-summary">${escapeHtml(rev.summary || '')}</div>
          <div class="verdict-badge ${rev.approve ? 'approve' : 'changes'}">
            ${rev.approve ? 'Approved' : 'Changes Requested'}
          </div>
        </div>
      </div>

      <div class="issues-grid">
        ${issueSection('Bugs', '', 'sev-bugs', rev.bugs)}
        ${issueSection('Security', '', 'sev-security', rev.security)}
        ${issueSection('Performance', '', 'sev-performance', rev.performance)}
        ${issueSection('Code Quality', '', 'sev-quality', rev.quality)}
        ${positivesSection(rev.positives)}
      </div>

      <div class="token-bar">
        <span>Tokens</span>
        Input: <span>${(r.token_usage?.input || 0).toLocaleString()}</span>
        &middot;
        Output: <span>${(r.token_usage?.output || 0).toLocaleString()}</span>
        &middot;
        Total: <span>${((r.token_usage?.input || 0) + (r.token_usage?.output || 0)).toLocaleString()}</span>
        &middot;
        Turns: <span>${rev.turns || 3}</span>
      </div>
    </div>`;
}

function issueSection(title, icon, colorClass, items) {
  const rows = (items || []).map(item => `
    <div class="issue-item">
      ${item.line ? `<div class="issue-location">${escapeHtml(item.line)}</div>` : ''}
      <div class="issue-desc">${escapeHtml(item.description || '')}</div>
      ${item.suggestion ? `<div class="issue-suggestion">${escapeHtml(item.suggestion)}</div>` : ''}
    </div>`).join('');

  const labels = { 'Bugs': 'Bug', 'Security': 'Vuln', 'Performance': 'Perf', 'Code Quality': 'Style' };
  const tag = labels[title] || title;

  return `
    <div class="issue-section">
      <div class="issue-section-header">
        <div class="icon-label">
          <span class="${colorClass}">${tag}</span>
          <span>${title}</span>
        </div>
        <div class="issue-count">${(items || []).length}</div>
      </div>
      <div class="issue-list">
        ${rows || '<div class="no-issues">None found</div>'}
      </div>
    </div>`;
}

function positivesSection(items) {
  if (!items?.length) return '';
  const rows = items.map(p => `<div class="positive-item">${escapeHtml(p)}</div>`).join('');
  return `
    <div class="issue-section issue-section-full">
      <div class="issue-section-header">
        <div class="icon-label"><span style="color:var(--green);font-weight:700;">Praise</span><span>Positives</span></div>
        <div class="issue-count">${items.length}</div>
      </div>
      <div class="issue-list">${rows}</div>
    </div>`;
}

document.getElementById('input-pr').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitReview();
});

window.addEventListener('beforeunload', stopPolling);

(async function init() {
  await refreshJobs();
  await refreshStats();
  statsInterval = setInterval(refreshStats, 10000);
})();
</script>
</body>
</html>
