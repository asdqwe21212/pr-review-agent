<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Review Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #1e242c;
    --border2: #252c37;
    --text: #c8d6e8;
    --text-dim: #5a6a7e;
    --text-muted: #3a4a5e;
    --accent: #00d4ff;
    --accent2: #0099bb;
    --green: #00e87a;
    --red: #ff4560;
    --orange: #ff9f40;
    --yellow: #ffd166;
    --purple: #b388ff;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10, 12, 15, 0.95);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 14px;
    box-shadow: 0 0 12px rgba(0, 212, 255, 0.2);
    animation: pulse-border 3s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 12px rgba(0, 212, 255, 0.2); }
    50% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
  }

  .logo-text {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #fff;
  }

  .logo-text span { color: var(--accent); }

  .header-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Main layout */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 360px 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
  }

  /* Stats bar */
  .stats-bar {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .stat-item {
    padding: 20px 28px;
    border-right: 1px solid var(--border);
    transition: background 0.2s;
  }
  .stat-item:last-child { border-right: none; }
  .stat-item:hover { background: var(--surface); }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: var(--sans);
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--orange); }

  .stat-sub { font-size: 10px; color: var(--text-muted); }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Review Form */
  .form-panel {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border2);
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.1);
  }

  .form-input::placeholder { color: var(--text-muted); }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 12px;
  }

  .checkbox-row input[type=checkbox] { accent-color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }

  .btn-primary:hover { background: #33ddff; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    background: var(--border2);
    color: var(--text-muted);
    cursor: not-allowed;
    transform: none;
  }

  /* Job List */
  .jobs-panel {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .jobs-panel::-webkit-scrollbar { width: 4px; }
  .jobs-panel::-webkit-scrollbar-track { background: transparent; }
  .jobs-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .jobs-header {
    padding: 16px 24px 12px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .job-item {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .job-item:hover { background: var(--surface); }
  .job-item.active { background: var(--surface2); border-left: 2px solid var(--accent); }

  .job-status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .job-status-dot.pending { background: var(--text-muted); }
  .job-status-dot.running { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); animation: blink 1s infinite; }
  .job-status-dot.done { background: var(--green); }
  .job-status-dot.error { background: var(--red); }

  .job-info { flex: 1; min-width: 0; }

  .job-repo {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .job-meta { font-size: 10px; color: var(--text-dim); }

  .job-score {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
  }

  /* Content panel */
  .content {
    overflow-y: auto;
    background: var(--surface);
  }

  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 16px;
  }

  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-text { font-size: 12px; letter-spacing: 1px; }

  /* Review Detail */
  .review-detail { padding: 32px; }

  .review-header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .review-pr-number {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .review-title {
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 12px;
    line-height: 1.3;
  }

  .review-meta-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .review-meta-item { font-size: 11px; color: var(--text-dim); }
  .review-meta-item span { color: var(--text); }

  /* Score circle */
  .score-section {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 24px;
    align-items: center;
    margin-bottom: 28px;
    padding: 24px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .score-circle {
    width: 88px; height: 88px;
    position: relative;
  }

  .score-circle svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .score-circle-bg { fill: none; stroke: var(--border2); stroke-width: 6; }
  .score-circle-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }

  .score-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 800;
    color: #fff;
  }

  .score-info {}
  .score-summary { font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 12px; }

  .verdict-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .verdict-badge.approve { background: rgba(0, 232, 122, 0.15); color: var(--green); border: 1px solid rgba(0, 232, 122, 0.3); }
  .verdict-badge.changes { background: rgba(255, 69, 96, 0.15); color: var(--red); border: 1px solid rgba(255, 69, 96, 0.3); }

  /* Issue sections */
  .issues-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .issue-section {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .issue-section-full { grid-column: 1 / -1; }

  .issue-section-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .issue-section-header .icon-label { display: flex; align-items: center; gap: 8px; }
  .issue-count {
    background: var(--border2);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 10px;
    color: var(--text-dim);
  }

  .issue-list { padding: 8px 0; }

  .issue-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }
  .issue-item:last-child { border-bottom: none; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .issue-location {
    font-size: 10px;
    color: var(--accent);
    background: rgba(0, 212, 255, 0.08);
    border-radius: 4px;
    padding: 2px 6px;
    display: inline-block;
    margin-bottom: 6px;
  }

  .issue-desc { font-size: 12px; color: var(--text); margin-bottom: 6px; line-height: 1.5; }

  .issue-suggestion {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    border-left: 2px solid var(--border2);
    padding: 6px 10px;
    border-radius: 0 4px 4px 0;
    line-height: 1.5;
  }

  .no-issues {
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 11px;
  }

  /* Positives */
  .positive-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .positive-item:last-child { border-bottom: none; }
  .positive-item::before { content: '✓'; color: var(--green); font-weight: 700; flex-shrink: 0; }

  /* Token usage */
  .token-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 24px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-top: 16px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .token-bar span { color: var(--accent); font-weight: 600; }

  /* Loading state */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 20px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }

  .turn-indicator {
    font-size: 11px;
    color: var(--accent);
    margin-top: 4px;
  }

  /* Severity colors */
  .sev-critical { color: var(--red); }
  .sev-high { color: var(--orange); }
  .sev-medium { color: var(--yellow); }
  .sev-low { color: var(--green); }
  .sev-bugs { color: var(--red); }
  .sev-security { color: var(--orange); }
  .sev-performance { color: var(--yellow); }
  .sev-quality { color: var(--purple); }

  /* Responsive */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; }
    .issues-grid { grid-template-columns: 1fr; }
    .stats-bar { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⌥</div>
      <div class="logo-text">PR<span>Review</span>Agent</div>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      <span id="agent-status">Claude API · Online</span>
    </div>
  </header>

  <main>
    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-label">Total Reviews</div>
        <div class="stat-value accent" id="stat-total">0</div>
        <div class="stat-sub">all time</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Completed</div>
        <div class="stat-value green" id="stat-done">0</div>
        <div class="stat-sub">successful</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Running</div>
        <div class="stat-value" id="stat-running">0</div>
        <div class="stat-sub">in progress</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Avg Score</div>
        <div class="stat-value orange" id="stat-score">—</div>
        <div class="stat-sub">out of 100</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Tokens Used</div>
        <div class="stat-value" id="stat-tokens">0</div>
        <div class="stat-sub">total</div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Submit Form -->
      <div class="form-panel">
        <div class="panel-title">New Review</div>
        <div class="form-group">
          <label class="form-label">Repository</label>
          <input class="form-input" id="input-repo" type="text" placeholder="owner/repo-name">
        </div>
        <div class="form-group">
          <label class="form-label">PR Number</label>
          <input class="form-input" id="input-pr" type="number" placeholder="42">
        </div>
        <div class="form-group">
          <label class="checkbox-row">
            <input type="checkbox" id="input-comment" checked>
            Post comment to GitHub
          </label>
        </div>
        <button class="btn-primary" id="btn-review" onclick="submitReview()">
          ▶ Start Review
        </button>
      </div>

      <!-- Job List -->
      <div class="jobs-panel">
        <div class="jobs-header">
          Recent Jobs
          <div class="status-dot" style="margin-left: auto;"></div>
        </div>
        <div id="job-list">
          <div style="padding: 24px; text-align: center; color: var(--text-muted); font-size: 11px;">
            No reviews yet
          </div>
        </div>
      </div>
    </aside>

    <!-- Content Panel -->
    <div class="content" id="content">
      <div class="empty-state">
        <div class="empty-icon">⌥</div>
        <div class="empty-text">Select a job or submit a new PR review</div>
      </div>
    </div>
  </main>
</div>

<script>
const API = '';  // Same origin; change to http://localhost:8000 for local dev
let selectedJob = null;
let pollInterval = null;
let statsInterval = null;

// ─── API ───────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(err.detail || r.statusText);
  }
  return r.json();
}

// ─── Submit ────────────────────────────────────────────────────────────
async function submitReview() {
  const repo = document.getElementById('input-repo').value.trim();
  const pr = parseInt(document.getElementById('input-pr').value);
  const postComment = document.getElementById('input-comment').checked;

  if (!repo || !pr) { alert('Please enter a repository and PR number.'); return; }
  if (!repo.includes('/')) { alert('Repository must be in format: owner/repo'); return; }

  const btn = document.getElementById('btn-review');
  btn.disabled = true;
  btn.textContent = '⏳ Submitting...';

  try {
    const job = await api('/api/review', {
      method: 'POST',
      body: JSON.stringify({ repo, pr_number: pr, post_comment: postComment }),
    });
    document.getElementById('input-repo').value = '';
    document.getElementById('input-pr').value = '';
    await refreshJobs();
    selectJob(job.job_id);
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Start Review';
  }
}

// ─── Jobs ──────────────────────────────────────────────────────────────
async function refreshJobs() {
  const jobs = await api('/api/jobs');
  const container = document.getElementById('job-list');

  if (!jobs.length) {
    container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:11px;">No reviews yet</div>';
    return;
  }

  container.innerHTML = jobs.map(j => {
    const score = j.result?.review?.overall_score;
    const scoreColor = score >= 80 ? 'var(--green)' : score >= 60 ? 'var(--yellow)' : 'var(--red)';
    const repoShort = j.repo ? j.repo.split('/')[1] || j.repo : '—';
    const time = j.created_at ? new Date(j.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
    return `
      <div class="job-item ${j.job_id === selectedJob ? 'active' : ''}" onclick="selectJob('${j.job_id}')">
        <div class="job-status-dot ${j.status}"></div>
        <div class="job-info">
          <div class="job-repo">${repoShort} <span style="color:var(--text-dim)">#${j.pr_number}</span></div>
          <div class="job-meta">${j.status.toUpperCase()} · ${time}</div>
        </div>
        ${score !== undefined ? `<div class="job-score" style="color:${scoreColor}">${score}</div>` : ''}
      </div>`;
  }).join('');

  // Auto-refresh running jobs
  const hasRunning = jobs.some(j => j.status === 'pending' || j.status === 'running');
  if (hasRunning && !pollInterval) {
    pollInterval = setInterval(async () => {
      await refreshJobs();
      if (selectedJob) await renderJobDetail(selectedJob);
      const fresh = await api('/api/jobs');
      if (!fresh.some(j => j.status === 'pending' || j.status === 'running')) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    }, 2500);
  }
}

async function selectJob(jobId) {
  selectedJob = jobId;
  await refreshJobs(); // update active state
  await renderJobDetail(jobId);
}

// ─── Stats ─────────────────────────────────────────────────────────────
async function refreshStats() {
  try {
    const s = await api('/api/stats');
    document.getElementById('stat-total').textContent = s.total_reviews;
    document.getElementById('stat-done').textContent = s.completed;
    document.getElementById('stat-running').textContent = s.running;
    document.getElementById('stat-score').textContent = s.avg_score || '—';
    document.getElementById('stat-tokens').textContent = formatTokens(s.total_tokens);
  } catch(e) {}
}

function formatTokens(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(0) + 'K';
  return n || '0';
}

// ─── Detail View ───────────────────────────────────────────────────────
async function renderJobDetail(jobId) {
  const job = await api(`/api/jobs/${jobId}`);
  const content = document.getElementById('content');
  await refreshStats();

  if (job.status === 'pending' || job.status === 'running') {
    const turnMessages = [
      'Fetching PR context from GitHub...',
      'Turn 1: Scanning for bugs & security vulnerabilities...',
      'Turn 2: Analyzing performance & code quality...',
      'Turn 3: Generating structured review report...',
    ];
    const turnIdx = Math.floor(Date.now() / 4000) % turnMessages.length;
    content.innerHTML = `
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">${job.status.toUpperCase()}</div>
        <div class="turn-indicator">${turnMessages[turnIdx]}</div>
      </div>`;
    return;
  }

  if (job.status === 'error') {
    content.innerHTML = `
      <div class="review-detail">
        <div style="color:var(--red);padding:24px;background:rgba(255,69,96,0.1);border:1px solid rgba(255,69,96,0.3);border-radius:8px;">
          <div style="font-size:13px;font-weight:600;margin-bottom:8px;">Review Failed</div>
          <div style="font-size:12px;color:var(--text-dim)">${job.error}</div>
        </div>
      </div>`;
    return;
  }

  const r = job.result;
  const rev = r.review;
  const score = rev.overall_score || 0;
  const scoreColor = score >= 80 ? 'var(--green)' : score >= 60 ? 'var(--yellow)' : 'var(--red)';
  const circumference = 2 * Math.PI * 36;
  const dashOffset = circumference * (1 - score / 100);

  content.innerHTML = `
    <div class="review-detail">
      <div class="review-header">
        <div class="review-pr-number">${r.repo} · PR #${r.pr_number}</div>
        <div class="review-title">${r.title}</div>
        <div class="review-meta-row">
          <div class="review-meta-item">Severity: <span class="sev-${rev.severity}">${(rev.severity || '').toUpperCase()}</span></div>
          <div class="review-meta-item">Bugs: <span>${rev.bugs?.length || 0}</span></div>
          <div class="review-meta-item">Security: <span>${rev.security?.length || 0}</span></div>
          <div class="review-meta-item">Performance: <span>${rev.performance?.length || 0}</span></div>
          <div class="review-meta-item">Quality: <span>${rev.quality?.length || 0}</span></div>
        </div>
      </div>

      <div class="score-section">
        <div class="score-circle">
          <svg viewBox="0 0 80 80">
            <circle class="score-circle-bg" cx="40" cy="40" r="36"/>
            <circle class="score-circle-fill" cx="40" cy="40" r="36"
              stroke="${scoreColor}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${dashOffset}"/>
          </svg>
          <div class="score-number">${score}</div>
        </div>
        <div class="score-info">
          <div class="score-summary">${rev.summary || ''}</div>
          <div class="verdict-badge ${rev.approve ? 'approve' : 'changes'}">
            ${rev.approve ? '✓ APPROVED' : '↻ CHANGES REQUESTED'}
          </div>
        </div>
      </div>

      <div class="issues-grid">
        ${issueSection('Bugs', '🐛', 'sev-bugs', rev.bugs)}
        ${issueSection('Security', '🔒', 'sev-security', rev.security)}
        ${issueSection('Performance', '⚡', 'sev-performance', rev.performance)}
        ${issueSection('Code Quality', '📝', 'sev-quality', rev.quality)}
        ${positivesSection(rev.positives)}
      </div>

      <div class="token-bar">
        <span>⟨/⟩</span>
        Input tokens: <span>${(r.token_usage?.input || 0).toLocaleString()}</span>
        &nbsp;·&nbsp;
        Output tokens: <span>${(r.token_usage?.output || 0).toLocaleString()}</span>
        &nbsp;·&nbsp;
        Total: <span>${((r.token_usage?.input || 0) + (r.token_usage?.output || 0)).toLocaleString()}</span>
        &nbsp;·&nbsp;
        Turns: <span>${rev.turns || 3}</span>
      </div>
    </div>`;
}

function issueSection(title, icon, colorClass, items) {
  const rows = (items || []).map(item => `
    <div class="issue-item">
      ${item.line ? `<div class="issue-location">${item.line}</div>` : ''}
      <div class="issue-desc">${item.description || ''}</div>
      ${item.suggestion ? `<div class="issue-suggestion">💡 ${item.suggestion}</div>` : ''}
    </div>`).join('');

  return `
    <div class="issue-section">
      <div class="issue-section-header">
        <div class="icon-label">
          <span class="${colorClass}">${icon}</span>
          <span>${title}</span>
        </div>
        <div class="issue-count">${(items || []).length}</div>
      </div>
      <div class="issue-list">
        ${rows || '<div class="no-issues">None found ✓</div>'}
      </div>
    </div>`;
}

function positivesSection(items) {
  if (!items?.length) return '';
  const rows = items.map(p => `<div class="positive-item">${p}</div>`).join('');
  return `
    <div class="issue-section issue-section-full">
      <div class="issue-section-header">
        <div class="icon-label"><span style="color:var(--green)">✅</span><span>Positives</span></div>
        <div class="issue-count">${items.length}</div>
      </div>
      <div class="issue-list">${rows}</div>
    </div>`;
}

// ─── Init ──────────────────────────────────────────────────────────────
document.getElementById('input-pr').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitReview();
});

(async function init() {
  await refreshJobs();
  await refreshStats();
  statsInterval = setInterval(refreshStats, 10000);
})();
</script>
